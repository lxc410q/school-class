<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg'/>" sizes="any">
  <link href="css/bootstrap.min.css" rel="stylesheet" type="text/css" media="all">
  <link rel="stylesheet" href="css/lightbox.css">
  <link rel="stylesheet" href="css/custom.css">
  <link href="https://fonts.googleapis.com/css?family=Noto+Sans+SC:300,400,500,700|Noto+Serif+SC:400,700" rel="stylesheet">
  <style>
    :root {
      --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      --accent-color: #667eea;
      --bg-light: #f8f9ff;
      --card-shadow: 0 8px 30px rgba(102, 126, 234, 0.15);
      --card-hover-shadow: 0 15px 40px rgba(102, 126, 234, 0.25);
    }

    * {
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-light);
      overflow-x: hidden;
    }

    /* 移动优化的导航栏 */
    .mobile-navbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(102, 126, 234, 0.1);
      padding: 12px 16px;
      transition: all 0.3s ease;
    }

    .mobile-navbar.scrolled {
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
    }

    .navbar-content {
      display: flex;
      align-items: center;
      justify-content: space-between;
      max-width: 1200px;
      margin: 0 auto;
    }

    .nav-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: #1a1a2e;
    }

    .nav-logo-icon {
      width: 36px;
      height: 36px;
      background: var(--primary-gradient);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 700;
      font-size: 16px;
    }

    .nav-title {
      font-weight: 700;
      font-size: 17px;
      letter-spacing: -0.3px;
    }

    .menu-toggle {
      width: 40px;
      height: 40px;
      border: none;
      background: rgba(102, 126, 234, 0.1);
      border-radius: 10px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 5px;
      transition: all 0.3s ease;
    }

    .menu-toggle span {
      width: 20px;
      height: 2px;
      background: var(--accent-color);
      border-radius: 2px;
      transition: all 0.3s ease;
    }

    .menu-toggle.active span:nth-child(1) {
      transform: translateY(7px) rotate(45deg);
    }

    .menu-toggle.active span:nth-child(2) {
      opacity: 0;
    }

    .menu-toggle.active span:nth-child(3) {
      transform: translateY(-7px) rotate(-45deg);
    }

    /* 移动端菜单 */
    .mobile-menu {
      position: fixed;
      top: 64px;
      left: 0;
      right: 0;
      background: rgba(255, 255, 255, 0.98);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: 20px;
      transform: translateY(-100%);
      opacity: 0;
      transition: all 0.3s ease;
      z-index: 999;
      border-bottom: 1px solid rgba(102, 126, 234, 0.1);
    }

    .mobile-menu.active {
      transform: translateY(0);
      opacity: 1;
    }

    .mobile-menu a {
      display: block;
      padding: 14px 20px;
      color: #1a1a2e;
      text-decoration: none;
      font-size: 16px;
      font-weight: 500;
      border-radius: 12px;
      margin-bottom: 8px;
      transition: all 0.2s ease;
    }

    .mobile-menu a:hover,
    .mobile-menu a.active {
      background: rgba(102, 126, 234, 0.1);
      color: var(--accent-color);
    }

    /* 页面头部 */
    .page-header {
      padding: 100px 20px 40px;
      background: var(--primary-gradient);
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .page-header::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 60%);
      animation: pulse 8s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }

    .header-content {
      position: relative;
      z-index: 1;
    }

    .page-title {
      font-family: 'Noto Serif SC', serif;
      font-size: 32px;
      font-weight: 700;
      color: white;
      margin-bottom: 10px;
      letter-spacing: 2px;
      animation: fadeInUp 0.8s ease;
    }

    .page-subtitle {
      color: rgba(255, 255, 255, 0.85);
      font-size: 14px;
      letter-spacing: 1px;
      animation: fadeInUp 0.8s ease 0.2s both;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* 画廊容器 */
    .gallery-container {
      padding: 30px 16px 80px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    @media (min-width: 576px) {
      .gallery-grid {
        grid-template-columns: repeat(3, 1fr);
        gap: 16px;
      }
    }

    @media (min-width: 992px) {
      .gallery-grid {
        grid-template-columns: repeat(4, 1fr);
        gap: 20px;
      }
    }

    /* 画廊项目 */
    .gallery-card {
      position: relative;
      border-radius: 16px;
      overflow: hidden;
      background: white;
      box-shadow: var(--card-shadow);
      cursor: pointer;
      aspect-ratio: 1;
      animation: fadeInScale 0.6s ease both;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .gallery-card:nth-child(1) { animation-delay: 0.1s; }
    .gallery-card:nth-child(2) { animation-delay: 0.15s; }
    .gallery-card:nth-child(3) { animation-delay: 0.2s; }
    .gallery-card:nth-child(4) { animation-delay: 0.25s; }
    .gallery-card:nth-child(5) { animation-delay: 0.3s; }
    .gallery-card:nth-child(6) { animation-delay: 0.35s; }
    .gallery-card:nth-child(7) { animation-delay: 0.4s; }
    .gallery-card:nth-child(8) { animation-delay: 0.45s; }
    .gallery-card:nth-child(9) { animation-delay: 0.5s; }

    @keyframes fadeInScale {
      from {
        opacity: 0;
        transform: scale(0.9);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .gallery-card:hover {
      transform: translateY(-8px) scale(1.02);
      box-shadow: var(--card-hover-shadow);
    }

    .gallery-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.6s ease;
    }

    .gallery-card:hover img {
      transform: scale(1.1);
    }

    .gallery-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0, 0, 0, 0.6) 0%, transparent 50%);
      opacity: 0;
      transition: opacity 0.3s ease;
      display: flex;
      align-items: flex-end;
      padding: 16px;
    }

    .gallery-card:hover .gallery-overlay {
      opacity: 1;
    }

    .gallery-zoom-icon {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0);
      width: 50px;
      height: 50px;
      background: rgba(255, 255, 255, 0.95);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
    }

    .gallery-card:hover .gallery-zoom-icon {
      transform: translate(-50%, -50%) scale(1);
    }

    .gallery-zoom-icon svg {
      width: 24px;
      height: 24px;
      fill: var(--accent-color);
    }

    /* 底部信息条 */
    .bottom-info {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: 12px 16px;
      text-align: center;
      border-top: 1px solid rgba(102, 126, 234, 0.1);
      z-index: 100;
    }

    .photo-count {
      color: #666;
      font-size: 13px;
    }

    .photo-count span {
      color: var(--accent-color);
      font-weight: 700;
      font-size: 16px;
    }

    /* 桌面端优化 */
    @media (min-width: 768px) {
      .mobile-navbar {
        padding: 16px 24px;
      }

      .nav-title {
        font-size: 20px;
      }

      .page-header {
        padding: 140px 40px 60px;
      }

      .page-title {
        font-size: 48px;
      }

      .page-subtitle {
        font-size: 16px;
      }

      .gallery-container {
        padding: 50px 24px 100px;
      }
    }
  </style>
</head>

  <script src="js/lightbox-plus-jquery.min.js"></script>
  <script>
    // 移动端菜单切换
    const menuToggle = document.getElementById('menuToggle');
    const mobileMenu = document.getElementById('mobileMenu');
    const mobileNavbar = document.getElementById('mobileNavbar');

    menuToggle.addEventListener('click', () => {
      menuToggle.classList.toggle('active');
      mobileMenu.classList.toggle('active');
    });

    // 点击菜单项关闭菜单
    document.querySelectorAll('.mobile-menu a').forEach(link => {
      link.addEventListener('click', () => {
        menuToggle.classList.remove('active');
        mobileMenu.classList.remove('active');
      });
    });

    // 滚动时导航栏效果
    let lastScroll = 0;
    window.addEventListener('scroll', () => {
      const currentScroll = window.pageYOffset;
      
      if (currentScroll > 50) {
        mobileNavbar.classList.add('scrolled');
      } else {
        mobileNavbar.classList.remove('scrolled');
      }
      
      lastScroll = currentScroll;
    });

    // 配置 lightbox
    lightbox.option({
      'resizeDuration': 200,
      'wrapAround': true,
      'alwaysShowNavOnTouchDevices': true,
      'disableScrolling': true
    });
  </script>

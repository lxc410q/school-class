<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="format-detection" content="telephone=no">
  <title>MySQL学习工具 - 大数据1701班</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg'/>" sizes="any">
  <link href="css/bootstrap.min.css" rel="stylesheet" type="text/css" media="all">
  <link rel="stylesheet" href="css/custom.css">
  <link href="https://fonts.googleapis.com/css?family=Noto+Sans+SC:300,400,500,700|Noto+Serif+SC:400,700" rel="stylesheet">
  <style>
    :root {
      --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      --accent-color: #667eea;
      --bg-light: #f8f9ff;
      --card-shadow: 0 8px 30px rgba(102, 126, 234, 0.15);
      --card-hover-shadow: 0 15px 40px rgba(102, 126, 234, 0.25);
    }

    * { -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-light);
      overflow-x: hidden;
    }

    .mobile-navbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
      background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(102, 126, 234, 0.1);
      padding: 12px 16px; transition: all 0.3s ease;
    }

    .mobile-navbar.scrolled { box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08); }

    .navbar-content {
      display: flex; align-items: center; justify-content: space-between;
      max-width: 1200px; margin: 0 auto;
    }

    .nav-brand {
      display: flex; align-items: center; gap: 10px;
      text-decoration: none; color: #1a1a2e;
    }

    .nav-logo-icon {
      width: 36px; height: 36px; background: var(--primary-gradient);
      border-radius: 10px; display: flex; align-items: center; justify-content: center;
      color: white; font-weight: 700; font-size: 16px;
    }

    .nav-title { font-weight: 700; font-size: 17px; letter-spacing: -0.3px; }

    .menu-toggle {
      width: 40px; height: 40px; border: none;
      background: rgba(102, 126, 234, 0.1); border-radius: 10px;
      cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 5px; transition: all 0.3s ease;
    }

    .menu-toggle span {
      width: 20px; height: 2px; background: var(--accent-color);
      border-radius: 2px; transition: all 0.3s ease;
    }

    .menu-toggle.active span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .menu-toggle.active span:nth-child(2) { opacity: 0; }
    .menu-toggle.active span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

    .mobile-menu {
      position: fixed; top: 64px; left: 0; right: 0;
      background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px); padding: 20px;
      transform: translateY(-100%); opacity: 0; transition: all 0.3s ease;
      z-index: 999; border-bottom: 1px solid rgba(102, 126, 234, 0.1);
    }

    .mobile-menu.active { transform: translateY(0); opacity: 1; }

    .mobile-menu a {
      display: block; padding: 14px 20px; color: #1a1a2e;
      text-decoration: none; font-size: 16px; font-weight: 500;
      border-radius: 12px; margin-bottom: 8px; transition: all 0.2s ease;
    }

    .mobile-menu a:hover, .mobile-menu a.active {
      background: rgba(102, 126, 234, 0.1);
      color: var(--accent-color);
    }

    .hero-section {
      padding: 100px 16px 60px; background: var(--primary-gradient);
      text-align: center; position: relative; overflow: hidden;
    }

    .hero-section::before {
      content: ''; position: absolute; top: -50%; left: -50%;
      width: 200%; height: 200%;
      background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 60%);
      animation: pulse 8s ease-in-out infinite;
    }

    @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }

    .hero-content { position: relative; z-index: 1; }

    .hero-title {
      font-family: 'Noto Serif SC', serif; font-size: 32px; font-weight: 700;
      color: white; margin-bottom: 10px; letter-spacing: 2px;
      animation: fadeInUp 0.8s ease;
    }

    .hero-subtitle {
      color: rgba(255, 255, 255, 0.85); font-size: 14px; letter-spacing: 1px;
      animation: fadeInUp 0.8s ease 0.2s both;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .content-container {
      padding: 30px 16px 100px; max-width: 1200px; margin: 0 auto;
    }

    .study-card {
      background: white; border-radius: 20px; padding: 24px;
      margin-bottom: 20px; box-shadow: var(--card-shadow);
      animation: fadeInScale 0.6s ease both;
    }

    @keyframes fadeInScale {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }

    .study-card h2 {
      color: var(--accent-color); font-size: 20px; font-weight: 700;
      margin-bottom: 16px; display: flex; align-items: center; gap: 10px;
    }

    .study-card h2::before {
      content: ''; width: 4px; height: 20px;
      background: var(--primary-gradient); border-radius: 2px;
    }

    .study-nav {
      display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 24px;
    }

    .study-nav a {
      padding: 10px 20px; background: rgba(102, 126, 234, 0.1);
      color: var(--accent-color); text-decoration: none; border-radius: 25px;
      font-weight: 500; font-size: 14px; transition: all 0.3s ease;
    }

    .study-nav a:hover, .study-nav a.active {
      background: var(--primary-gradient); color: white;
    }

    .tool-item {
      background: linear-gradient(135deg, rgba(102, 126, 234, 0.03) 0%, rgba(118, 75, 162, 0.03) 100%);
      border-radius: 16px; padding: 20px; margin-bottom: 16px;
      border: 1px solid rgba(102, 126, 234, 0.08);
      transition: all 0.3s ease;
    }

    .tool-item:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(102, 126, 234, 0.1);
    }

    .tool-header {
      display: flex; align-items: center; gap: 12px; margin-bottom: 12px;
    }

    .tool-icon {
      width: 48px; height: 48px; background: var(--primary-gradient);
      border-radius: 12px; display: flex; align-items: center; justify-content: center;
      color: white; font-size: 24px; font-weight: 700;
    }

    .tool-title {
      font-size: 18px; font-weight: 700; color: #1a1a2e;
    }

    .tool-desc {
      color: #666; line-height: 1.7; text-indent: 2em;
    }

    @media (min-width: 768px) {
      .mobile-navbar { padding: 16px 24px; }
      .nav-title { font-size: 20px; }
      .hero-section { padding: 140px 40px 80px; }
      .hero-title { font-size: 48px; }
      .hero-subtitle { font-size: 18px; }
      .content-container { padding: 50px 24px 120px; }
    }
  </style>
</head>
<body>
  <nav class="mobile-navbar" id="mobileNavbar">
    <div class="navbar-content">
      <a href="index.html" class="nav-brand">
        <div class="nav-logo-icon">17</div>
        <span class="nav-title">大数据1701班</span>
      </a>
      <button class="menu-toggle" id="menuToggle" aria-label="菜单">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <div class="mobile-menu" id="mobileMenu">
    <a href="index.html">班级概况</a>
    <a href="class.html">学生风采</a>
    <a href="courses.html">专业动态</a>
    <a href="study.html">学习天地</a>
    <a href="activities.html">课外视野</a>
  </div>

  <section class="hero-section">
    <div class="hero-content">
      <h1 class="hero-title">MySQL 学习工具</h1>
      <p class="hero-subtitle">数据库工具推荐</p>
    </div>
  </section>

  <main class="content-container">
    <section class="study-card">
      <h2>数据库工具</h2>
      <div class="study-nav">
        <a href="MySQL.html">简介</a>
        <a href="MySQL-2.html">学习资料</a>
        <a href="MySQL-3.html" class="active">学习工具</a>
      </div>
      
      <div class="tool-item">
        <div class="tool-header">
          <div class="tool-icon">R</div>
          <div class="tool-title">1. 关系型数据库</div>
        </div>
        <p class="tool-desc">Oracle、DB2、Microsoft SQL Server、MySQL等关系型数据库管理系统。</p>
      </div>

      <div class="tool-item">
        <div class="tool-header">
          <div class="tool-icon">N</div>
          <div class="tool-title">2. 非关系型数据库</div>
        </div>
        <p class="tool-desc">mongoDB、redis、hbase等非关系型数据库管理系统。</p>
      </div>
    </section>
  </main>

  <script src="study-js/jquery-1.11.0.min.js" type="text/javascript"></script>
  <script src="js/vendor/bootstrap.min.js"></script>
  <script>
    const menuToggle = document.getElementById('menuToggle');
    const mobileMenu = document.getElementById('mobileMenu');
    const mobileNavbar = document.getElementById('mobileNavbar');

    menuToggle.addEventListener('click', () => {
      menuToggle.classList.toggle('active');
      mobileMenu.classList.toggle('active');
    });

    document.querySelectorAll('.mobile-menu a').forEach(link => {
      link.addEventListener('click', () => {
        menuToggle.classList.remove('active');
        mobileMenu.classList.remove('active');
      });
    });

    let lastScroll = 0;
    window.addEventListener('scroll', () => {
      const currentScroll = window.pageYOffset;
      if (currentScroll > 50) {
        mobileNavbar.classList.add('scrolled');
      } else {
        mobileNavbar.classList.remove('scrolled');
      }
      lastScroll = currentScroll;
    });
  </script>
</body>
</html>
